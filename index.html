<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/Images/Ramadan_lantern-removebg.png"
      type="image/x-icon"
    />
    <title>Ramadan Countdown 🎉</title>
  </head>
  <body>
    <div id="ramadan" class="ramadan"></div>
    <h1>Ramadan Mubarak!</h1>
    <div id="countdown" class="countdown">
      <div class="time">
        <h2 id="days">00</h2>
        <small>days</small>
      </div>
      <div class="time">
        <h2 id="hours">00</h2>
        <small>hours</small>
      </div>
      <div class="time">
        <h2 id="minutes">00</h2>
        <small>minutes</small>
      </div>
      <div class="time">
        <h2 id="seconds">00</h2>
        <small>seconds</small>
      </div>
    </div>
    <div class="ramadan-date">
      Ramadan will, inshaAllah, be coming on <small>February 18, 2026🌙</small>
    </div>
    <img
      class="loading"
      src="https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyMmxreXBsMjBzbW14czk2MDhwdzV4NnRxMnRjajF2bDhyNWswMjF1dSZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/L05HgB2h6qICDs5Sms/200.gif"
      alt="Loading image"
      id="laoding"
    />
    <script src="script.js"></script>
  </body>
</html>
